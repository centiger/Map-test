<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CEN BibleMaps Test</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#f6f2ea;--ink:#1f2937;--muted:#6b7280;--blue:#23446c;--card:#fff;--line:#e5e7eb;--accent:#d97706}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif} 
.app{max-width:860px;margin:0 auto;padding:16px 14px 88px}.top{position:sticky;top:0;background:rgba(246,242,234,.96);backdrop-filter:blur(8px);z-index:5;padding:10px 0 12px;border-bottom:1px solid #eadfce}.brand{display:flex;justify-content:space-between;gap:8px;align-items:center}.brand h1{font-size:22px;margin:0;color:var(--blue)}.pill{font-size:12px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:999px;padding:4px 8px}.subtitle{font-size:13px;color:var(--muted);margin:4px 0 12px}.searchbar{display:flex;gap:8px}.searchbar input{flex:1;font-size:18px;border:2px solid #d6d3d1;border-radius:14px;padding:13px 14px;background:#fff}.searchbar button{border:0;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:700;padding:0 18px}.chips{display:flex;gap:8px;overflow:auto;padding:10px 0 2px}.chip{white-space:nowrap;border:1px solid #d6d3d1;border-radius:999px;padding:7px 11px;background:#fff;color:#374151;font-size:13px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;text-align:center}.stat b{display:block;color:var(--blue);font-size:20px}.stat span{font-size:12px;color:var(--muted)}.section-title{font-size:14px;color:var(--muted);margin:18px 2px 8px}.list{display:grid;gap:10px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.03)}.row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.name{font-weight:800;font-size:18px}.meta{font-size:12px;color:var(--muted);margin-top:3px}.badge{font-size:12px;font-weight:700;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#3730a3}.badge.null{background:#f3f4f6;color:#6b7280}.summary{font-size:14px;line-height:1.55;color:#374151;margin:10px 0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;padding:9px 11px;font-size:14px;font-weight:700}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.alt{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.maps{margin-top:10px;border-top:1px dashed #e5e7eb;padding-top:10px}.mapitem{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6}.mapitem:last-child{border-bottom:0}.map-title{font-size:14px;font-weight:700}.map-label{font-size:12px;color:var(--muted)}.empty{text-align:center;color:var(--muted);padding:40px 20px;background:#fff;border-radius:18px}.footer-nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;padding:10px 12px}.footer-nav button{border:0;border-radius:999px;background:#f3f4f6;padding:10px 16px;font-weight:800}.footer-nav button.active{background:var(--blue);color:#fff} dialog{border:0;border-radius:18px;padding:0;width:min(760px,94vw);max-height:86vh}.dialog-head{padding:14px 16px;background:var(--blue);color:#fff;font-weight:800;display:flex;justify-content:space-between}.dialog-body{padding:14px;overflow:auto;max-height:72vh}.close{background:transparent;color:#fff;border:0;font-size:22px} @media(max-width:480px){.app{padding:12px 10px 78px}.brand h1{font-size:20px}.stats{grid-template-columns:repeat(3,1fr)}.searchbar input{font-size:16px}.card{padding:12px}.name{font-size:17px}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand"><h1>CEN BibleMaps</h1><span class="pill">Map First Test</span></div>
    <div class="subtitle">410개 지명 · 764개 지도 링크 · 성서공회 공식 지도 우선</div>
    <div class="searchbar"><input id="q" placeholder="지명 검색: 예루살렘, 하란, 갈릴리..." autocomplete="off"/><button id="searchBtn">검색</button></div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="stats"><div class="stat"><b id="placeCount">-</b><span>Places</span></div><div class="stat"><b id="linkCount">-</b><span>Links</span></div><div class="stat"><b id="mapCount">-</b><span>Maps</span></div></div>
  <div class="section-title" id="resultTitle">대표 지명</div>
  <div class="list" id="results"></div>
</div>
<div class="footer-nav"><button class="active" id="homeBtn">홈</button><button id="allBtn">전체</button><button id="mapsBtn">지도목록</button></div>
<dialog id="mapDialog"><div class="dialog-head"><span>지도 목록</span><button class="close" onclick="mapDialog.close()">×</button></div><div class="dialog-body" id="mapList"></div></dialog>
<script src="app.js"></script>
</body>
</html>
